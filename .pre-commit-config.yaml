repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.8.4
  hooks:
    # Run the linter.
    - id: ruff
      args: [--fix]
    # Run the formatter.
    - id: ruff-format

- repo: local
  hooks:
    - id: pytest
      name: pytest
      description: 'Run tests with pytest'
      entry: pytest --cov=app
      language: python
      types: [python]
      require_serial: true
      pass_filenames: false
      always_run: true
      additional_dependencies:
        - pytest-coverage
        - pytest-asyncio
